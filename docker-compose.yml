services:
  openclaw-gateway:
    build:
      context: .
      args:
        OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-openclaw:local}
    image: openclaw-secure:local
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-claude-opus-4-5-20251101}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-OpenClaw}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-openclaw@users.noreply.github.com}
      GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-OpenClaw}
      GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-openclaw@users.noreply.github.com}
      NODE_OPTIONS: "--max-old-space-size=1536"
    volumes:
      - workspace:/home/node/.openclaw/workspace
      - logs:/home/node/.openclaw/logs
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-loopback}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
      - seccomp=config/seccomp-profile.json
    cap_drop:
      - ALL
    user: "1000:1000"
    read_only: true
    privileged: false
    tmpfs:
      - /tmp:size=128M,nosuid,nodev
      - /home/node/.npm:size=64M
      - /home/node/.config/git:size=4M
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
          pids: 256
        reservations:
          cpus: "0.25"
          memory: 128M

  openclaw-cli:
    image: openclaw-secure:local
    network_mode: "service:openclaw-gateway"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
    volumes:
      - workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy

    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
      - seccomp=config/seccomp-profile.json
    cap_drop:
      - ALL
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid,nodev
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 64

volumes:
  workspace:
  logs:
